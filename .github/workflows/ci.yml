name: Sentinel CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_sentinel
          MYSQL_DATABASE: sentinel_db
          MYSQL_USER: sentinel
          MYSQL_PASSWORD: sentinel_dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u sentinel -psentinel_dev"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check sentinel/ tests/ scripts/

      - name: Run unit tests
        env:
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_USER: sentinel
          MYSQL_PASSWORD: sentinel_dev
          MYSQL_DATABASE: sentinel_db
          REDIS_URL: redis://localhost:6379
          MLFLOW_TRACKING_URI: sqlite:///./mlflow_test.db
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          USE_LOCAL_EMBEDDINGS: "true"
          ENVIRONMENT: development
        run: pytest tests/unit/ -v --tb=short --cov=sentinel --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t sentinel-api:${{ github.sha }} .
